name: CI

on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ '**' ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore SportsSln.sln

      - name: Build
        run: dotnet build SportsSln.sln --no-restore --configuration Release

      - name: Test
        run: |
          dotnet test SportsSln.sln --no-build --configuration Release --verbosity normal --logger "trx;LogFileName=test-results.trx"

      # Optional: test results publishing was causing 403 for this repo
      # CI requirements are already met by dotnet test (job fails if tests fail),
      # so the reporting step is removed to keep the workflow green.
